<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>روابطي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12161B; --panel:#1A2028; --panel-hi:#222A34; --steel:#2E3947;
    --amber:#D89B4A; --amber-deep:#B87F35;
    --text:#E8EAED; --text-soft:#96A0AC; --line:rgba(255,255,255,0.09); --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Tajawal',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 50% 0%, rgba(216,155,74,0.07), transparent 55%);
  }
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;}

  .shell{max-width:520px;margin:0 auto;padding:34px 20px 60px;min-height:100vh;}
  .head{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .avatar{width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid var(--amber);}
  .avatar-fallback{width:100px;height:100px;border-radius:50%;background:var(--panel);border:2px solid var(--amber);display:flex;align-items:center;justify-content:center;font-size:34px;}
  h1.title{font-family:'El Messiri',sans-serif;font-size:25px;font-weight:700;margin:4px 0 0;text-align:center;}
  p.bio{font-size:14px;color:var(--text-soft);text-align:center;margin:0;max-width:350px;line-height:1.75;}
  .socials{display:flex;gap:9px;justify-content:center;margin-top:6px;}
  .chip{font-size:12.5px;padding:7px 16px;border-radius:8px;background:var(--panel);color:var(--text-soft);border:1px solid var(--line);font-weight:600;transition:all .15s ease;}
  .chip:hover{background:var(--panel-hi);color:var(--amber);border-color:var(--amber);}

  .rule{display:flex;align-items:center;gap:12px;margin:34px 0 18px;color:var(--text-soft);font-size:11.5px;letter-spacing:1.5px;}
  .rule::before,.rule::after{content:"";flex:1;height:1px;background:var(--line);}

  .list{display:flex;flex-direction:column;gap:12px;}
  .item{
    display:flex;gap:14px;align-items:center;background:var(--panel);
    border:1px solid var(--line);border-radius:var(--radius);padding:14px;
    position:relative;overflow:hidden;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
    animation:rise .35s ease backwards;
  }
  @keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  .item:hover{transform:translateY(-2px);border-color:var(--steel);background:var(--panel-hi);}
  .item.pick{border-color:var(--amber);}
  .item.pick::before{content:"";position:absolute;top:0;bottom:0;right:0;width:3px;background:var(--amber);}
  .thumb{width:66px;height:66px;border-radius:11px;object-fit:cover;flex-shrink:0;background:var(--steel);}
  .info{flex:1;min-width:0;}
  .pick-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--amber);margin-bottom:3px;}
  .name{font-weight:700;font-size:15px;line-height:1.4;}
  .desc{font-size:12.5px;color:var(--text-soft);margin-top:3px;line-height:1.55;}
  .code{display:inline-block;margin-top:7px;font-size:11px;background:rgba(216,155,74,0.14);color:var(--amber);padding:4px 11px;border-radius:6px;font-weight:700;border:1px solid rgba(216,155,74,0.25);}
  .go{flex-shrink:0;background:var(--amber);color:#12161B;border:none;border-radius:9px;padding:11px 17px;font-size:13px;font-weight:700;white-space:nowrap;transition:background .15s ease;}
  .go:hover{background:var(--amber-deep);}
  .go:focus-visible,.chip:focus-visible{outline:2px solid var(--amber);outline-offset:3px;}

  .msg{text-align:center;color:var(--text-soft);font-size:14px;padding:50px 20px;line-height:1.8;}
  .skel{height:96px;border-radius:var(--radius);background:linear-gradient(90deg,var(--panel),var(--panel-hi),var(--panel));background-size:200% 100%;animation:shim 1.4s infinite;}
  @keyframes shim{from{background-position:200% 0;}to{background-position:-200% 0;}}
</style>
</head>
<body>
<div class="shell" id="shell">
  <div class="list"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, query, orderBy }
  from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBl1vIBlNKTXbVGQOUUQ7ZSCmQ1jka2_6Y",
  authDomain: "uploads-links.firebaseapp.com",
  projectId: "uploads-links",
  storageBucket: "uploads-links.firebasestorage.app",
  messagingSenderId: "469182887111",
  appId: "1:469182887111:web:166cd3ef442b4f0b063ae2",
  measurementId: "G-DB6WG3JBGL"
};

const db = getFirestore(initializeApp(firebaseConfig));
const esc = s => (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

async function load(){
  const shell = document.getElementById('shell');
  try{
    const [sSnap, pSnap] = await Promise.all([
      getDoc(doc(db,'config','settings')),
      getDocs(query(collection(db,'products'), orderBy('createdAt','desc')))
    ]);

    const s = sSnap.exists() ? sSnap.data() : { title:'اسم الحساب', bio:'', avatar:'', tiktok:'', instagram:'' };
    const items = [];
    pSnap.forEach(d => items.push({ id:d.id, ...d.data() }));
    const ordered = [...items.filter(p=>p.featured), ...items.filter(p=>!p.featured)];

    shell.innerHTML = `
      <div class="head">
        ${s.avatar ? `<img class="avatar" src="${esc(s.avatar)}" alt="">`
                   : `<div class="avatar-fallback">⚡</div>`}
        <h1 class="title">${esc(s.title)}</h1>
        ${s.bio ? `<p class="bio">${esc(s.bio)}</p>` : ''}
        <div class="socials">
          ${s.tiktok ? `<a class="chip" href="${esc(s.tiktok)}" target="_blank" rel="noopener">تيك توك</a>`:''}
          ${s.instagram ? `<a class="chip" href="${esc(s.instagram)}" target="_blank" rel="noopener">انستجرام</a>`:''}
        </div>
      </div>

      <div class="rule">اللي بنصح بيه</div>

      <div class="list">
        ${ordered.length ? ordered.map(card).join('')
          : `<div class="msg">لسه مفيش منتجات مضافة</div>`}
      </div>
    `;
  }catch(err){
    console.error(err);
    shell.innerHTML = `<div class="msg">مش قادرين نحمّل المنتجات دلوقتي.<br>جرّب تعمل تحديث للصفحة.</div>`;
  }
}

function card(p, i){
  return `
    <div class="item ${p.featured?'pick':''}" style="animation-delay:${i*0.05}s">
      ${p.image ? `<img class="thumb" src="${esc(p.image)}" alt="" loading="lazy">`
                : `<div class="thumb"></div>`}
      <div class="info">
        ${p.featured ? `<div class="pick-tag">اختيار اليوم</div>`:''}
        <div class="name">${esc(p.name)}</div>
        ${p.desc ? `<div class="desc">${esc(p.desc)}</div>`:''}
        ${p.code ? `<div class="code">كود: ${esc(p.code)}</div>`:''}
      </div>
      <a href="${esc(p.link)}" target="_blank" rel="noopener sponsored"><button class="go">شوفه</button></a>
    </div>`;
}

load();
</script>
</body>
</html>
