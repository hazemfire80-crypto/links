<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحتي - رجالي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=Tajawal:wght@400;500;700&family=IBM+Plex+Sans+Arabic:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#F4F2EC;
    --card:#E7E4DB;
    --navy:#233240;
    --navy-deep:#161F27;
    --bronze:#B08245;
    --olive:#5C6B4E;
    --ink:#242322;
    --ink-soft:#67635C;
    --line:rgba(36,35,34,0.14);
    --radius:22px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ivory);
    color:var(--ink);
    font-family:'Tajawal',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important;}
  }
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;}

  .shell{max-width:520px;margin:0 auto;padding:28px 20px 60px;min-height:100vh;position:relative;}

  .avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:8px;}
  .avatar{
    width:96px;height:96px;border-radius:50%;object-fit:cover;
    border:3px solid var(--ivory);
    box-shadow:0 0 0 3px var(--navy);
    background:var(--card);
  }
  .avatar-fallback{
    width:96px;height:96px;border-radius:50%;
    background:var(--card);
    box-shadow:0 0 0 3px var(--navy);
    display:flex;align-items:center;justify-content:center;
  }
  h1.page-title{
    font-family:'El Messiri',sans-serif;
    font-size:26px;font-weight:700;margin:2px 0 0;text-align:center;color:var(--navy-deep);
  }
  p.page-bio{
    font-size:14px;color:var(--ink-soft);text-align:center;margin:2px 0 0;max-width:340px;line-height:1.7;
  }
  .socials{display:flex;gap:10px;justify-content:center;margin-top:10px;}
  .social-chip{
    font-size:12px;padding:6px 14px;border-radius:100px;background:var(--card);color:var(--navy-deep);
    border:1px solid var(--line);font-weight:500;
  }

  .divider{
    display:flex;align-items:center;gap:10px;margin:30px 0 18px;color:var(--ink-soft);font-size:12px;
  }
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line);}

  .product-list{display:flex;flex-direction:column;gap:14px;}
  .product-card{
    display:flex;gap:14px;align-items:center;
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;position:relative;overflow:hidden;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .product-card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(22,31,39,0.12);}
  .product-card.featured{
    background:linear-gradient(135deg,var(--card),#fff);
    border:1.5px solid var(--navy);
  }
  .product-img{
    width:64px;height:64px;border-radius:16px;object-fit:cover;flex-shrink:0;background:var(--card);
  }
  .product-info{flex:1;min-width:0;}
  .badge-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
  .cat-badge{width:20px;height:20px;flex-shrink:0;}
  .product-name{font-weight:700;font-size:15px;color:var(--ink);line-height:1.4;}
  .product-desc{font-size:12.5px;color:var(--ink-soft);margin-top:2px;line-height:1.5;}
  .code-chip{
    display:inline-flex;align-items:center;gap:4px;margin-top:6px;
    font-size:11px;background:var(--olive);color:#fff;padding:3px 10px;border-radius:100px;font-weight:600;
    letter-spacing:0.3px;
  }
  .go-btn{
    flex-shrink:0;background:var(--navy);color:#fff;border:none;border-radius:100px;
    padding:10px 16px;font-size:13px;font-weight:700;white-space:nowrap;
    box-shadow:0 4px 10px rgba(35,50,64,0.3);
  }
  .go-btn:hover{background:var(--navy-deep);}
  .go-btn:focus-visible, .social-chip:focus-visible, .admin-btn:focus-visible, input:focus-visible, .icon-btn:focus-visible{
    outline:3px solid var(--bronze); outline-offset:2px;
  }
  .featured-tag{
    position:absolute; top:-1px; right:14px; background:var(--bronze); color:#fff;
    font-size:10px; font-weight:700; padding:3px 10px; border-radius:0 0 10px 10px;
  }

  .empty-state{
    text-align:center;color:var(--ink-soft);font-size:14px;padding:50px 20px;
  }

  .foot-gear{
    display:flex;justify-content:center;margin-top:40px;
  }
  .foot-gear a{font-size:11px;color:var(--line);}

  .admin-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
  .admin-title{font-family:'El Messiri',sans-serif;font-size:22px;font-weight:700;color:var(--navy-deep);}
  .icon-btn{
    background:var(--card);border:1px solid var(--line);border-radius:100px;padding:8px 16px;
    font-size:13px;font-weight:600;color:var(--navy-deep);
  }
  .lock-screen{
    display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:16px;
    text-align:center;
  }
  .lock-screen input{
    text-align:center;font-size:20px;letter-spacing:6px;width:160px;padding:12px;border-radius:14px;
    border:1.5px solid var(--line);background:#fff;
  }
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--navy-deep);margin-bottom:6px;}
  .field input, .field textarea, .field select{
    width:100%;padding:11px 13px;border-radius:12px;border:1.5px solid var(--line);
    font-family:'Tajawal',sans-serif;font-size:14px;background:#fff;color:var(--ink);
  }
  .field textarea{resize:vertical;min-height:60px;}
  .card-panel{
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:18px;
  }
  .panel-heading{font-weight:700;font-size:14px;color:var(--navy-deep);margin:0 0 14px;display:flex;align-items:center;gap:8px;}
  .save-btn{
    background:var(--navy);color:#fff;border:none;border-radius:100px;padding:11px 22px;font-size:14px;font-weight:700;
    width:100%;
  }
  .save-btn:hover{background:var(--navy-deep);}
  .save-btn.secondary{background:var(--olive);}
  .row-2{display:flex;gap:10px;}
  .row-2 .field{flex:1;}
  .admin-product-item{
    display:flex;gap:10px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:10px;margin-bottom:10px;
    background:#fff;
  }
  .admin-product-item img{width:44px;height:44px;border-radius:10px;object-fit:cover;background:var(--card);flex-shrink:0;}
  .admin-product-item .meta{flex:1;min-width:0;}
  .admin-product-item .meta .n{font-weight:700;font-size:13px;}
  .admin-product-item .meta .l{font-size:11px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mini-actions{display:flex;gap:6px;flex-shrink:0;}
  .mini-btn{
    border:1px solid var(--line);background:var(--ivory);border-radius:8px;padding:6px 9px;font-size:12px;
  }
  .mini-btn.danger{color:#a83b3b;border-color:#f0d5d5;}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--navy-deep);color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;
    opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  .note{font-size:11.5px;color:var(--ink-soft);line-height:1.6;margin-top:4px;}
  .disclaimer-box{
    background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:12px;
    color:var(--navy-deep);line-height:1.7;margin-bottom:18px;
  }
</style>
</head>
<body>
<div class="shell" id="shell"></div>
<div class="toast" id="toast"></div>

<script>
const STORE_SETTINGS = 'bio-site-settings-men';
const STORE_PRODUCTS = 'bio-products-list-men';
const STORE_ADMIN_PIN = 'bio-admin-pin-men';

let settings = { title:'اسم حسابك هنا', bio:'أدوات ونصايح عملية لكل راجل بيحب يظبط نفسه وحياته', avatar:'', tiktok:'', instagram:'' };
let products = [];
let adminUnlocked = false;

const CATEGORY_ICONS = {
  grooming: `<svg viewBox="0 0 24 24" fill="none"><path d="M6 4l9 9-3 3-9-9V4h3Z" stroke="var(--navy)" stroke-width="1.6" stroke-linejoin="round"/><path d="M14 10l5 5-2 2-5-5" stroke="var(--navy)" stroke-width="1.6" stroke-linejoin="round"/></svg>`,
  tech: `<svg viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="11" rx="2" stroke="var(--bronze)" stroke-width="1.6"/><path d="M9 20h6M12 16v4" stroke="var(--bronze)" stroke-width="1.6" stroke-linecap="round"/></svg>`,
  fitness: `<svg viewBox="0 0 24 24" fill="none"><path d="M4 9v6M20 9v6M7 12h10" stroke="var(--olive)" stroke-width="1.8" stroke-linecap="round"/><path d="M4 8v8M20 8v8" stroke="var(--olive)" stroke-width="2.4" stroke-linecap="round"/></svg>`,
  other: `<svg viewBox="0 0 24 24" fill="none"><path d="M12 3l2.3 5.6L20 9l-4.4 4 1.3 6.2L12 16l-4.9 3.2L8.4 13 4 9l5.7-.4L12 3Z" stroke="var(--bronze)" stroke-width="1.5" stroke-linejoin="round"/></svg>`
};
const CATEGORY_LABELS = { grooming:'عناية شخصية', tech:'تكنولوجيا وجادجت', fitness:'رياضة ولياقة', other:'أخرى' };

function uid(){ return 'p'+Date.now()+Math.floor(Math.random()*1000); }

async function loadAll(){
  try{
    const s = await window.storage.get(STORE_SETTINGS, true);
    if(s && s.value) settings = JSON.parse(s.value);
  }catch(e){}
  try{
    const p = await window.storage.get(STORE_PRODUCTS, true);
    if(p && p.value) products = JSON.parse(p.value);
  }catch(e){}
  route();
}

async function saveSettings(){
  await window.storage.set(STORE_SETTINGS, JSON.stringify(settings), true);
}
async function saveProducts(){
  await window.storage.set(STORE_PRODUCTS, JSON.stringify(products), true);
}
async function getAdminPin(){
  try{
    const r = await window.storage.get(STORE_ADMIN_PIN, true);
    if(r && r.value) return r.value;
  }catch(e){}
  return '1234';
}
async function setAdminPin(pin){
  await window.storage.set(STORE_ADMIN_PIN, pin, true);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function route(){
  if(location.hash.startsWith('#admin')){
    renderAdmin();
  } else {
    renderPublic();
  }
}
window.addEventListener('hashchange', route);

function renderPublic(){
  const shell = document.getElementById('shell');
  const featured = products.filter(p=>p.featured);
  const rest = products.filter(p=>!p.featured);
  const ordered = [...featured, ...rest];

  shell.innerHTML = `
    <div class="avatar-wrap">
      ${settings.avatar
        ? `<img class="avatar" src="${escapeAttr(settings.avatar)}" alt="">`
        : `<div class="avatar-fallback">⚙️</div>`}
      <h1 class="page-title">${escapeHtml(settings.title)}</h1>
      <p class="page-bio">${escapeHtml(settings.bio)}</p>
      <div class="socials">
        ${settings.tiktok ? `<a class="social-chip" href="${escapeAttr(settings.tiktok)}" target="_blank" rel="noopener">تيك توك</a>`:''}
        ${settings.instagram ? `<a class="social-chip" href="${escapeAttr(settings.instagram)}" target="_blank" rel="noopener">انستجرام</a>`:''}
      </div>
    </div>

    <div class="divider">اللي بنصح بيه</div>

    <div class="product-list">
      ${ordered.length ? ordered.map(p=>productCardHTML(p)).join('') : `<div class="empty-state">لسه مفيش منتجات مضافة</div>`}
    </div>

    <div class="foot-gear"><a href="#admin">·</a></div>
  `;
}

function productCardHTML(p){
  const icon = CATEGORY_ICONS[p.category] || CATEGORY_ICONS.other;
  const label = CATEGORY_LABELS[p.category] || CATEGORY_LABELS.other;
  return `
    <div class="product-card ${p.featured?'featured':''}">
      ${p.featured ? `<span class="featured-tag">توصية اليوم</span>`:''}
      ${p.image ? `<img class="product-img" src="${escapeAttr(p.image)}" alt="">` : `<div class="product-img"></div>`}
      <div class="product-info">
        <div class="badge-row">
          <span class="cat-badge">${icon}</span>
          <span style="font-size:11px;color:var(--ink-soft);">${label}</span>
        </div>
        <div class="product-name">${escapeHtml(p.name)}</div>
        ${p.desc ? `<div class="product-desc">${escapeHtml(p.desc)}</div>` : ''}
        ${p.code ? `<div class="code-chip">كود: ${escapeHtml(p.code)}</div>` : ''}
      </div>
      <a href="${escapeAttr(p.link)}" target="_blank" rel="noopener"><button class="go-btn">شوفه</button></a>
    </div>
  `;
}

function renderAdmin(){
  const shell = document.getElementById('shell');
  if(!adminUnlocked){
    shell.innerHTML = `
      <div class="lock-screen">
        <div style="font-size:34px;">🔒</div>
        <div style="font-weight:700;">صفحة الإدارة</div>
        <input id="pinInput" type="password" inputmode="numeric" placeholder="••••" maxlength="8">
        <button class="save-btn" style="width:auto;padding:10px 28px;" id="unlockBtn">دخول</button>
        <a href="#" style="font-size:12px;color:var(--ink-soft);" id="backLink">رجوع للصفحة العامة</a>
      </div>
    `;
    document.getElementById('unlockBtn').onclick = async ()=>{
      const val = document.getElementById('pinInput').value;
      const real = await getAdminPin();
      if(val === real){ adminUnlocked = true; renderAdmin(); }
      else showToast('الرقم غلط');
    };
    document.getElementById('pinInput').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('unlockBtn').click(); });
    document.getElementById('backLink').onclick = (e)=>{ e.preventDefault(); location.hash=''; };
    return;
  }

  shell.innerHTML = `
    <div class="admin-topbar">
      <span class="admin-title">لوحة الإدارة</span>
      <a href="#" id="viewPublic"><button class="icon-btn">شوفي الصفحة العامة</button></a>
    </div>

    <div class="disclaimer-box">
      تنبيه: صفحة الإدارة محمية برقم بسيط للتسهيل عليكِ بس، مش حماية قوية بمعنى تقني كامل. متشاركيش رابط الصفحة ده مع حد، واستخدمي رابط الصفحة العامة بس في البايو بتاعك.
    </div>

    <div class="card-panel">
      <div class="panel-heading">بيانات الصفحة</div>
      <div class="field"><label>اسم الحساب</label><input id="s-title" value="${escapeAttr(settings.title)}"></div>
      <div class="field"><label>الوصف (Bio)</label><textarea id="s-bio">${escapeHtml(settings.bio)}</textarea></div>
      <div class="field">
        <label>رابط صورة البروفايل</label>
        <input id="s-avatar" value="${escapeAttr(settings.avatar)}" placeholder="https://...">
        <div class="note"><a href="https://rodydev21.github.io/upload/" target="_blank" rel="noopener" style="color:var(--navy);font-weight:700;">↗ ارفعي صورة من هنا واحصلي على الرابط</a> وبعدين الصقيه فوق</div>
      </div>
      <div class="row-2">
        <div class="field"><label>رابط تيك توك</label><input id="s-tiktok" value="${escapeAttr(settings.tiktok)}" placeholder="اختياري"></div>
        <div class="field"><label>رابط انستجرام</label><input id="s-insta" value="${escapeAttr(settings.instagram)}" placeholder="اختياري"></div>
      </div>
      <button class="save-btn" id="saveSettingsBtn">حفظ بيانات الصفحة</button>
    </div>

    <div class="card-panel">
      <div class="panel-heading">إضافة منتج جديد</div>
      <div class="field"><label>اسم المنتج</label><input id="p-name" placeholder="مثال: ماكينة حلاقة"></div>
      <div class="field"><label>وصف قصير (اختياري)</label><input id="p-desc" placeholder="جملة صغيرة ليه بتنصح بيه"></div>
      <div class="field">
        <label>رابط صورة المنتج</label>
        <input id="p-image" placeholder="https://...">
        <div class="note"><a href="https://rodydev21.github.io/upload/" target="_blank" rel="noopener" style="color:var(--navy);font-weight:700;">↗ ارفعي صورة من هنا واحصلي على الرابط</a> وبعدين الصقيه فوق</div>
      </div>
      <div class="field"><label>رابط نون / أمازون (اللينك بتاع العمولة)</label><input id="p-link" placeholder="https://..."></div>
      <div class="row-2">
        <div class="field"><label>كود خصم (اختياري)</label><input id="p-code" placeholder="مثال: RODY10"></div>
        <div class="field"><label>التصنيف</label>
          <select id="p-cat">
            <option value="grooming">عناية شخصية</option>
            <option value="tech">تكنولوجيا وجادجت</option>
            <option value="fitness">رياضة ولياقة</option>
            <option value="other">أخرى</option>
          </select>
        </div>
      </div>
      <div class="field" style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="p-featured" style="width:auto;">
        <label style="margin:0;" for="p-featured">اعتبريه "توصية اليوم" (يظهر أول واحد ومميز)</label>
      </div>
      <button class="save-btn secondary" id="addProductBtn">إضافة المنتج</button>
    </div>

    <div class="card-panel">
      <div class="panel-heading">المنتجات الحالية (${products.length})</div>
      <div id="adminProductList">
        ${products.length ? products.map(p=>adminProductRow(p)).join('') : `<div class="empty-state">لسه مفيش منتجات</div>`}
      </div>
    </div>

    <div class="card-panel">
      <div class="panel-heading">تغيير رقم دخول الإدارة</div>
      <div class="field"><input id="newPin" type="password" inputmode="numeric" placeholder="رقم جديد" maxlength="8"></div>
      <button class="save-btn" id="changePinBtn">حفظ الرقم الجديد</button>
    </div>
  `;

  document.getElementById('viewPublic').onclick=(e)=>{e.preventDefault(); location.hash='';};

  document.getElementById('saveSettingsBtn').onclick = async ()=>{
    settings.title = document.getElementById('s-title').value || settings.title;
    settings.bio = document.getElementById('s-bio').value;
    settings.avatar = document.getElementById('s-avatar').value;
    settings.tiktok = document.getElementById('s-tiktok').value;
    settings.instagram = document.getElementById('s-insta').value;
    await saveSettings();
    showToast('تم حفظ بيانات الصفحة');
  };

  document.getElementById('addProductBtn').onclick = async ()=>{
    const name = document.getElementById('p-name').value.trim();
    const link = document.getElementById('p-link').value.trim();
    if(!name || !link){ showToast('لازم اسم المنتج والرابط على الأقل'); return; }
    const newProduct = {
      id: uid(),
      name,
      desc: document.getElementById('p-desc').value.trim(),
      image: document.getElementById('p-image').value.trim(),
      link,
      code: document.getElementById('p-code').value.trim(),
      category: document.getElementById('p-cat').value,
      featured: document.getElementById('p-featured').checked
    };
    products.unshift(newProduct);
    await saveProducts();
    showToast('اتضاف المنتج');
    renderAdmin();
  };

  document.getElementById('changePinBtn').onclick = async ()=>{
    const val = document.getElementById('newPin').value.trim();
    if(val.length < 4){ showToast('خلي الرقم 4 أرقام على الأقل'); return; }
    await setAdminPin(val);
    showToast('اتغير الرقم');
  };

  bindProductRowActions();
}

function adminProductRow(p){
  return `
    <div class="admin-product-item" data-id="${p.id}">
      ${p.image ? `<img src="${escapeAttr(p.image)}" alt="">` : `<div style="width:44px;height:44px;border-radius:10px;background:var(--card);flex-shrink:0;"></div>`}
      <div class="meta">
        <div class="n">${escapeHtml(p.name)} ${p.featured?'⭐':''}</div>
        <div class="l">${escapeHtml(p.link)}</div>
      </div>
      <div class="mini-actions">
        <button class="mini-btn" data-action="feature" data-id="${p.id}">${p.featured?'إلغاء التمييز':'تمييز'}</button>
        <button class="mini-btn danger" data-action="delete" data-id="${p.id}">حذف</button>
      </div>
    </div>
  `;
}

function bindProductRowActions(){
  document.querySelectorAll('[data-action="delete"]').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.getAttribute('data-id');
      products = products.filter(p=>p.id!==id);
      await saveProducts();
      showToast('اتمسح المنتج');
      renderAdmin();
    };
  });
  document.querySelectorAll('[data-action="feature"]').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.getAttribute('data-id');
      products = products.map(p=> p.id===id ? {...p, featured: !p.featured} : p);
      await saveProducts();
      renderAdmin();
    };
  });
}

function escapeHtml(str){
  if(!str) return '';
