<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>لوحة التحكم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12161B; --panel:#1A2028; --panel-hi:#222A34; --steel:#2E3947;
    --amber:#D89B4A; --amber-deep:#B87F35; --green:#4E8A5C; --danger:#C0504A;
    --text:#E8EAED; --text-soft:#96A0AC; --line:rgba(255,255,255,0.09);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
  button{font-family:inherit;cursor:pointer;border:none;}
  a{color:var(--amber);text-decoration:none;}

  .wrap{max-width:840px;margin:0 auto;padding:26px 18px 80px;}

  .login{max-width:370px;margin:13vh auto;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:30px 26px;text-align:center;}
  .login h2{font-family:'El Messiri',sans-serif;margin:0 0 6px;color:var(--amber);}
  .login p{font-size:13px;color:var(--text-soft);margin:0 0 22px;}

  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
  .topbar h1{font-family:'El Messiri',sans-serif;font-size:22px;margin:0;}
  .acts-top{display:flex;gap:8px;}
  .ghost{background:var(--panel);color:var(--text-soft);border:1px solid var(--line);border-radius:8px;padding:9px 15px;font-size:13px;font-weight:600;transition:all .15s ease;}
  .ghost:hover{background:var(--panel-hi);color:var(--amber);border-color:var(--amber);}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px;}
  .phead{font-weight:700;font-size:15px;color:var(--amber);margin:0 0 18px;display:flex;justify-content:space-between;align-items:center;}
  .phead .count{font-weight:500;color:var(--text-soft);font-size:13px;}

  .field{margin-bottom:15px;}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--text-soft);margin-bottom:7px;}
  .field input,.field textarea{
    width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--line);
    font-family:'Tajawal',sans-serif;font-size:14px;background:#0E1216;color:var(--text);
    transition:border-color .15s ease;
  }
  .field input::placeholder,.field textarea::placeholder{color:#5C6672;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--amber);}
  .field textarea{resize:vertical;min-height:60px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  @media(max-width:560px){.grid2{grid-template-columns:1fr;}}
  .hint{font-size:11.5px;color:var(--text-soft);margin-top:6px;line-height:1.6;}

  .btn{background:var(--amber);color:#12161B;border-radius:10px;padding:13px 22px;font-size:14px;font-weight:700;width:100%;transition:background .15s ease;}
  .btn:hover{background:var(--amber-deep);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn.green{background:var(--green);color:#fff;}
  .btn.green:hover{background:#3F7049;}

  .drop{border:2px dashed var(--line);border-radius:12px;padding:20px;text-align:center;background:#0E1216;transition:all .15s ease;cursor:pointer;}
  .drop:hover,.drop.over{border-color:var(--amber);background:var(--panel-hi);}
  .drop-inner{font-size:13px;color:var(--text-soft);}
  .prev{display:flex;align-items:center;gap:13px;justify-content:center;}
  .prev img{width:70px;height:70px;object-fit:cover;border-radius:11px;border:1px solid var(--line);}
  .bar{height:5px;background:var(--steel);border-radius:100px;overflow:hidden;margin-top:12px;}
  .bar span{display:block;height:100%;background:var(--amber);width:0;transition:width .2s ease;}

  .prod{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:#0E1216;transition:border-color .15s ease;}
  .prod:hover{border-color:var(--steel);}
  .prod img,.prod .noimg{width:52px;height:52px;border-radius:10px;object-fit:cover;background:var(--steel);flex-shrink:0;}
  .prod .meta{flex:1;min-width:0;}
  .prod .n{font-weight:700;font-size:13.5px;}
  .prod .l{font-size:11px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:ltr;text-align:right;margin-top:2px;}
  .prod .acts{display:flex;gap:6px;flex-shrink:0;}
  .mini{border:1px solid var(--line);background:var(--panel);border-radius:7px;padding:7px 11px;font-size:12px;font-weight:600;color:var(--text-soft);transition:all .15s ease;}
  .mini:hover{background:var(--panel-hi);color:var(--text);}
  .mini.danger{color:var(--danger);}
  .mini.danger:hover{background:rgba(192,80,74,0.12);}
  .mini.on{background:var(--amber);color:#12161B;border-color:var(--amber);}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#fff;padding:12px 24px;border-radius:10px;font-size:13.5px;font-weight:700;opacity:0;pointer-events:none;transition:all .25s ease;z-index:99;box-shadow:0 8px 24px rgba(0,0,0,.4);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.err{background:var(--danger);}

  .empty{text-align:center;color:var(--text-soft);font-size:14px;padding:30px;}
  .editing{background:rgba(216,155,74,0.1);border:1px solid rgba(216,155,74,0.3);border-radius:10px;padding:10px 14px;font-size:12.5px;color:var(--amber);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="empty">جاري التحميل…</div></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc,
         updateDoc, deleteDoc, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject }
  from "https://www.gstatic.com/firebasejs/12.16.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBl1vIBlNKTXbVGQOUUQ7ZSCmQ1jka2_6Y",
  authDomain: "uploads-links.firebaseapp.com",
  projectId: "uploads-links",
  storageBucket: "uploads-links.firebasestorage.app",
  messagingSenderId: "469182887111",
  appId: "1:469182887111:web:166cd3ef442b4f0b063ae2",
  measurementId: "G-DB6WG3JBGL"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let settings = { title:'', bio:'', avatar:'', tiktok:'', instagram:'' };
let products = [];
let editingId = null;
let pendingImage = { url:'', path:'' };
let pendingAvatar = { url:'', path:'' };

const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

function toast(msg, isErr){
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(()=>t.className='toast', 2400);
}

onAuthStateChanged(auth, user => user ? boot() : renderLogin());

function renderLogin(){
  $('app').innerHTML = `
    <div class="login">
      <h2>لوحة التحكم</h2>
      <p>سجّل دخولك مرة واحدة والمتصفح هيفتكرك</p>
      <div class="field"><input id="em" type="email" placeholder="الإيميل" autocomplete="username"></div>
      <div class="field"><input id="pw" type="password" placeholder="الباسورد" autocomplete="current-password"></div>
      <button class="btn" id="loginBtn">دخول</button>
    </div>`;
  const go = async () => {
    const b = $('loginBtn'); b.disabled = true; b.textContent = 'جاري الدخول…';
    try{ await signInWithEmailAndPassword(auth, $('em').value.trim(), $('pw').value); }
    catch(e){ toast('الإيميل أو الباسورد غلط', true); b.disabled=false; b.textContent='دخول'; }
  };
  $('loginBtn').onclick = go;
  $('pw').onkeydown = e => { if(e.key==='Enter') go(); };
}

async function boot(){
  try{
    const [sSnap, pSnap] = await Promise.all([
      getDoc(doc(db,'config','settings')),
      getDocs(query(collection(db,'products'), orderBy('createdAt','desc')))
    ]);
    if(sSnap.exists()) settings = { ...settings, ...sSnap.data() };
    products = [];
    pSnap.forEach(d => products.push({ id:d.id, ...d.data() }));
    render();
  }catch(e){
    console.error(e);
    $('app').innerHTML = `<div class="empty">مشكلة في تحميل البيانات. اتأكد من قواعد Firestore.</div>`;
  }
}

function render(){
  const ed = editingId ? products.find(p=>p.id===editingId) : null;

  $('app').innerHTML = `
    <div class="topbar">
      <h1>لوحة التحكم</h1>
      <div class="acts-top">
        <a href="./index.html" target="_blank"><button class="ghost">الصفحة العامة ↗</button></a>
        <button class="ghost" id="logoutBtn">خروج</button>
      </div>
    </div>

    <div class="panel">
      <div class="phead">بيانات الصفحة</div>
      <div class="field"><label>اسم الحساب</label><input id="s-title" value="${esc(settings.title)}"></div>
      <div class="field"><label>الوصف تحت الاسم</label><textarea id="s-bio">${esc(settings.bio)}</textarea></div>

      <div class="field">
        <label>صورة البروفايل</label>
        <div class="drop" id="avatarDrop">
          <div id="avatarInner" class="drop-inner">
            ${settings.avatar ? `<div class="prev"><img src="${esc(settings.avatar)}"><span>اضغط لتغيير الصورة</span></div>`
                              : 'اضغط هنا أو اسحب الصورة'}
          </div>
          <div class="bar" id="avatarBar" style="display:none"><span></span></div>
        </div>
        <input type="file" id="avatarFile" accept="image/*" hidden>
      </div>

      <div class="grid2">
        <div class="field"><label>رابط تيك توك</label><input id="s-tiktok" value="${esc(settings.tiktok)}" placeholder="اختياري" dir="ltr"></div>
        <div class="field"><label>رابط انستجرام</label><input id="s-insta" value="${esc(settings.instagram)}" placeholder="اختياري" dir="ltr"></div>
      </div>
      <button class="btn" id="saveSettings">حفظ بيانات الصفحة</button>
    </div>

    <div class="panel">
      <div class="phead">${ed ? 'تعديل المنتج' : 'إضافة منتج جديد'}</div>
      ${ed ? `<div class="editing"><span>بتعدّل: ${esc(ed.name)}</span><button class="mini" id="cancelEdit">إلغاء</button></div>`:''}

      <div class="field"><label>اسم المنتج *</label><input id="p-name" value="${esc(ed?.name)}" placeholder="اسم المنتج"></div>
      <div class="field"><label>وصف قصير</label><input id="p-desc" value="${esc(ed?.desc)}" placeholder="ليه بتنصح بيه"></div>

      <div class="field">
        <label>صورة المنتج</label>
        <div class="drop" id="prodDrop">
          <div id="prodInner" class="drop-inner">
            ${(pendingImage.url || ed?.image)
              ? `<div class="prev"><img src="${esc(pendingImage.url || ed.image)}"><span>اضغط لتغيير الصورة</span></div>`
              : 'اضغط هنا أو اسحب صورة المنتج من جهازك'}
          </div>
          <div class="bar" id="prodBar" style="display:none"><span></span></div>
        </div>
        <input type="file" id="prodFile" accept="image/*" hidden>
        <div class="hint">الصورة بتترفع من جهازك على طول وبتوصل لكل الناس</div>
      </div>

      <div class="field"><label>رابط نون / أمازون (لينك العمولة) *</label><input id="p-link" value="${esc(ed?.link)}" placeholder="https://..." dir="ltr"></div>
      <div class="field"><label>كود خصم</label><input id="p-code" value="${esc(ed?.code)}" placeholder="اختياري" dir="ltr"></div>

      <div class="field" style="display:flex;align-items:center;gap:9px;">
        <input type="checkbox" id="p-feat" style="width:auto" ${ed?.featured?'checked':''}>
        <label for="p-feat" style="margin:0;font-weight:500;color:var(--text);">اختيار اليوم (يظهر أول واحد ومميز)</label>
      </div>

      <button class="btn green" id="saveProduct">${ed?'حفظ التعديل':'إضافة المنتج'}</button>
    </div>

    <div class="panel">
      <div class="phead">المنتجات <span class="count">${products.length}</span></div>
      ${products.length ? products.map(row).join('') : `<div class="empty">لسه مفيش منتجات</div>`}
    </div>
  `;
  bind();
}

function row(p){
  return `
    <div class="prod">
      ${p.image ? `<img src="${esc(p.image)}" alt="">` : `<div class="noimg"></div>`}
      <div class="meta">
        <div class="n">${esc(p.name)}</div>
        <div class="l">${esc(p.link)}</div>
      </div>
      <div class="acts">
        <button class="mini ${p.featured?'on':''}" data-feat="${p.id}">${p.featured?'مميّز':'تمييز'}</button>
        <button class="mini" data-edit="${p.id}">تعديل</button>
        <button class="mini danger" data-del="${p.id}">حذف</button>
      </div>
    </div>`;
}

function wireUpload(dropId, fileId, barId, innerId, onDone){
  const drop = $(dropId), input = $(fileId), bar = $(barId), inner = $(innerId);
  drop.onclick = () => input.click();
  drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
  drop.ondragleave = () => drop.classList.remove('over');
  drop.ondrop = e => { e.preventDefault(); drop.classList.remove('over');
    if(e.dataTransfer.files[0]) handle(e.dataTransfer.files[0]); };
  input.onchange = () => { if(input.files[0]) handle(input.files[0]); };

  function handle(file){
    if(!file.type.startsWith('image/')){ toast('لازم تكون صورة', true); return; }
    if(file.size > 5*1024*1024){ toast('الصورة أكبر من 5 ميجا', true); return; }

    const path = `images/${Date.now()}_${file.name.replace(/[^\w.\-]/g,'_')}`;
    const task = uploadBytesResumable(ref(storage, path), file);
    bar.style.display = 'block';
    inner.textContent = 'جاري الرفع…';

    task.on('state_changed',
      s => bar.firstElementChild.style.width = (s.bytesTransferred/s.totalBytes*100)+'%',
      err => { console.error(err); toast('فشل رفع الصورة — اتأكد من قواعد Storage', true);
               bar.style.display='none'; inner.textContent='اضغط هنا لاختيار صورة'; },
      async () => {
        const url = await getDownloadURL(task.snapshot.ref);
        bar.style.display='none';
        inner.innerHTML = `<div class="prev"><img src="${url}"><span>تم الرفع — اضغط للتغيير</span></div>`;
        onDone({ url, path });
        toast('اترفعت الصورة');
      }
    );
  }
}

function bind(){
  $('logoutBtn').onclick = () => signOut(auth);
  if($('cancelEdit')) $('cancelEdit').onclick = () => { editingId=null; pendingImage={url:'',path:''}; render(); };

  wireUpload('avatarDrop','avatarFile','avatarBar','avatarInner', r => pendingAvatar = r);
  wireUpload('prodDrop','prodFile','prodBar','prodInner', r => pendingImage = r);

  $('saveSettings').onclick = async () => {
    const b = $('saveSettings'); b.disabled=true; b.textContent='جاري الحفظ…';
    settings = {
      title: $('s-title').value.trim(),
      bio: $('s-bio').value.trim(),
      avatar: pendingAvatar.url || settings.avatar || '',
      tiktok: $('s-tiktok').value.trim(),
      instagram: $('s-insta').value.trim()
    };
    try{
      await setDoc(doc(db,'config','settings'), settings);
      pendingAvatar = {url:'',path:''};
      toast('اتحفظت بيانات الصفحة ✓');
    }catch(e){ console.error(e); toast('فشل الحفظ', true); }
    b.disabled=false; b.textContent='حفظ بيانات الصفحة';
  };

  $('saveProduct').onclick = async () => {
    const name = $('p-name').value.trim();
    const link = $('p-link').value.trim();
    if(!name){ toast('اكتب اسم المنتج', true); return; }
    if(!link){ toast('حط رابط المنتج', true); return; }

    const ed = editingId ? products.find(p=>p.id===editingId) : null;
    const data = {
      name, link,
      desc: $('p-desc').value.trim(),
      code: $('p-code').value.trim(),
      featured: $('p-feat').checked,
      image: pendingImage.url || ed?.image || '',
      imagePath: pendingImage.path || ed?.imagePath || ''
    };

    const b = $('saveProduct'); b.disabled=true; b.textContent='جاري الحفظ…';
    try{
      if(editingId){
        await updateDoc(doc(db,'products',editingId), data);
        toast('اتحفظ التعديل ✓');
      }else{
        data.createdAt = serverTimestamp();
        await addDoc(collection(db,'products'), data);
        toast('اتضاف المنتج ✓');
      }
      editingId=null; pendingImage={url:'',path:''};
      await boot();
    }catch(e){ console.error(e); toast('فشل الحفظ', true); b.disabled=false; b.textContent='إضافة المنتج'; }
  };

  document.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => {
    editingId = b.dataset.edit; pendingImage={url:'',path:''};
    render(); window.scrollTo({top:0, behavior:'smooth'});
  });

  document.querySelectorAll('[data-feat]').forEach(b => b.onclick = async () => {
    const p = products.find(x=>x.id===b.dataset.feat);
    try{
      await updateDoc(doc(db,'products',p.id), { featured: !p.featured });
      p.featured = !p.featured; render();
    }catch(e){ toast('فشل التعديل', true); }
  });

  document.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
    const p = products.find(x=>x.id===b.dataset.del);
    if(!confirm(`متأكد إنك عايز تمسح "${p.name}"؟`)) return;
    try{
      await deleteDoc(doc(db,'products',p.id));
      if(p.imagePath){ try{ await deleteObject(ref(storage,p.imagePath)); }catch(e){} }
      products = products.filter(x=>x.id!==p.id);
      if(editingId===p.id) editingId=null;
      render(); toast('اتمسح المنتج');
    }catch(e){ toast('فشل الحذف', true); }
  });
}
</script>
</body>
</html>
