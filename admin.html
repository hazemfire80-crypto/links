<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>لوحة التحكم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F5F2; --panel:#FFFFFF; --card:#F3ECEE;
    --plum:#7A2F4E; --plum-deep:#5B2038; --sage:#5F7A4E; --danger:#B23B3B;
    --ink:#2C2530; --ink-soft:#6E6470; --line:rgba(44,37,48,0.13);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
  button{font-family:inherit;cursor:pointer;border:none;}
  a{color:var(--plum);}

  .wrap{max-width:820px;margin:0 auto;padding:24px 18px 80px;}

  /* login */
  .login-box{max-width:360px;margin:14vh auto;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:28px 24px;text-align:center;}
  .login-box h2{font-family:'El Messiri',sans-serif;margin:0 0 6px;color:var(--plum-deep);}
  .login-box p{font-size:13px;color:var(--ink-soft);margin:0 0 20px;}

  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  .topbar h1{font-family:'El Messiri',sans-serif;font-size:22px;margin:0;color:var(--plum-deep);}
  .topbar-actions{display:flex;gap:8px;}
  .ghost-btn{background:var(--card);color:var(--plum-deep);border:1px solid var(--line);border-radius:100px;padding:8px 15px;font-size:13px;font-weight:600;}
  .ghost-btn:hover{background:#e8dde0;}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:20px;margin-bottom:18px;}
  .panel-head{font-weight:700;font-size:15px;color:var(--plum-deep);margin:0 0 16px;display:flex;justify-content:space-between;align-items:center;}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--plum-deep);margin-bottom:6px;}
  .field input,.field textarea,.field select{
    width:100%;padding:11px 13px;border-radius:12px;border:1.5px solid var(--line);
    font-family:'Tajawal',sans-serif;font-size:14px;background:#fff;color:var(--ink);
  }
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--plum);}
  .field textarea{resize:vertical;min-height:58px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:560px){.grid2{grid-template-columns:1fr;}}
  .hint{font-size:11.5px;color:var(--ink-soft);margin-top:5px;line-height:1.6;}

  .primary-btn{background:var(--plum);color:#fff;border-radius:100px;padding:12px 22px;font-size:14px;font-weight:700;width:100%;}
  .primary-btn:hover{background:var(--plum-deep);}
  .primary-btn:disabled{opacity:.55;cursor:not-allowed;}
  .primary-btn.green{background:var(--sage);}
  .primary-btn.green:hover{background:#4c6440;}

  /* image upload */
  .drop{
    border:2px dashed var(--line);border-radius:16px;padding:18px;text-align:center;
    background:#FCFAFB;transition:border-color .15s ease, background .15s ease;cursor:pointer;
  }
  .drop:hover,.drop.over{border-color:var(--plum);background:var(--card);}
  .drop-inner{font-size:13px;color:var(--ink-soft);}
  .preview-row{display:flex;align-items:center;gap:12px;}
  .preview-row img{width:70px;height:70px;object-fit:cover;border-radius:14px;border:1px solid var(--line);}
  .bar{height:5px;background:var(--card);border-radius:100px;overflow:hidden;margin-top:10px;}
  .bar span{display:block;height:100%;background:var(--sage);width:0;transition:width .2s ease;}

  /* product rows */
  .prod{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:11px;margin-bottom:10px;background:#fff;}
  .prod img,.prod .noimg{width:50px;height:50px;border-radius:12px;object-fit:cover;background:var(--card);flex-shrink:0;}
  .prod .meta{flex:1;min-width:0;}
  .prod .n{font-weight:700;font-size:13.5px;}
  .prod .l{font-size:11px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:ltr;text-align:right;}
  .prod .acts{display:flex;gap:6px;flex-shrink:0;}
  .chip-btn{border:1px solid var(--line);background:var(--bg);border-radius:9px;padding:6px 10px;font-size:12px;font-weight:600;color:var(--ink);}
  .chip-btn:hover{background:var(--card);}
  .chip-btn.danger{color:var(--danger);border-color:#f0d5d5;}
  .chip-btn.active{background:var(--plum);color:#fff;border-color:var(--plum);}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--plum-deep);color:#fff;padding:11px 22px;border-radius:100px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:all .25s ease;z-index:99;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.err{background:var(--danger);}

  .empty{text-align:center;color:var(--ink-soft);font-size:14px;padding:30px;}
  .edit-banner{background:#FFF4E0;border:1px solid #E8CE9B;border-radius:12px;padding:9px 14px;font-size:12.5px;color:#8A6420;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="empty">جاري التحميل…</div></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc,
         updateDoc, deleteDoc, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject }
  from "https://www.gstatic.com/firebasejs/12.16.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBl1vIBlNKTXbVGQOUUQ7ZSCmQ1jka2_6Y",
  authDomain: "uploads-links.firebaseapp.com",
  projectId: "uploads-links",
  storageBucket: "uploads-links.firebasestorage.app",
  messagingSenderId: "469182887111",
  appId: "1:469182887111:web:166cd3ef442b4f0b063ae2",
  measurementId: "G-DB6WG3JBGL"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const CATEGORIES = {
  skincare:'عناية بالبشرة', kitchen:'أدوات مطبخ', mom:'أمومة وطفل',
  fashion:'موضة وإكسسوار', home:'تنظيم البيت', other:'أخرى'
};

let settings = { title:'', bio:'', avatar:'', tiktok:'', instagram:'' };
let products = [];
let editingId = null;
let pendingImage = { url:'', path:'' };
let pendingAvatar = { url:'', path:'' };

const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

function toast(msg, isErr){
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(()=>t.className='toast', 2200);
}

/* ---------- AUTH ---------- */
onAuthStateChanged(auth, user => user ? boot() : renderLogin());

function renderLogin(){
  $('app').innerHTML = `
    <div class="login-box">
      <h2>لوحة التحكم</h2>
      <p>سجّلي دخولك مرة واحدة، والمتصفح هيفتكرك</p>
      <div class="field"><input id="em" type="email" placeholder="الإيميل" autocomplete="username"></div>
      <div class="field"><input id="pw" type="password" placeholder="الباسورد" autocomplete="current-password"></div>
      <button class="primary-btn" id="loginBtn">دخول</button>
    </div>`;
  const go = async () => {
    const btn = $('loginBtn'); btn.disabled = true; btn.textContent = 'جاري الدخول…';
    try{
      await signInWithEmailAndPassword(auth, $('em').value.trim(), $('pw').value);
    }catch(e){
      toast('الإيميل أو الباسورد غلط', true);
      btn.disabled = false; btn.textContent = 'دخول';
    }
  };
  $('loginBtn').onclick = go;
  $('pw').onkeydown = e => { if(e.key==='Enter') go(); };
}

/* ---------- LOAD ---------- */
async function boot(){
  try{
    const [sSnap, pSnap] = await Promise.all([
      getDoc(doc(db,'config','settings')),
      getDocs(query(collection(db,'products'), orderBy('createdAt','desc')))
    ]);
    if(sSnap.exists()) settings = { ...settings, ...sSnap.data() };
    products = [];
    pSnap.forEach(d => products.push({ id:d.id, ...d.data() }));
    render();
  }catch(e){
    console.error(e);
    $('app').innerHTML = `<div class="empty">مشكلة في تحميل البيانات. اتأكدي من قواعد Firestore.</div>`;
  }
}

/* ---------- RENDER ---------- */
function render(){
  const editing = editingId ? products.find(p=>p.id===editingId) : null;

  $('app').innerHTML = `
    <div class="topbar">
      <h1>لوحة التحكم</h1>
      <div class="topbar-actions">
        <a href="./index.html" target="_blank"><button class="ghost-btn">الصفحة العامة ↗</button></a>
        <button class="ghost-btn" id="logoutBtn">خروج</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">بيانات الصفحة</div>
      <div class="field"><label>اسم الحساب</label><input id="s-title" value="${esc(settings.title)}"></div>
      <div class="field"><label>الوصف تحت الاسم</label><textarea id="s-bio">${esc(settings.bio)}</textarea></div>

      <div class="field">
        <label>صورة البروفايل</label>
        <div class="drop" id="avatarDrop">
          <div id="avatarInner" class="drop-inner">
            ${settings.avatar ? `<div class="preview-row"><img src="${esc(settings.avatar)}"><span>اضغطي لتغيير الصورة</span></div>`
                              : 'اضغطي هنا أو اسحبي الصورة'}
          </div>
          <div class="bar" id="avatarBar" style="display:none"><span></span></div>
        </div>
        <input type="file" id="avatarFile" accept="image/*" hidden>
      </div>

      <div class="grid2">
        <div class="field"><label>رابط تيك توك</label><input id="s-tiktok" value="${esc(settings.tiktok)}" placeholder="اختياري"></div>
        <div class="field"><label>رابط انستجرام</label><input id="s-insta" value="${esc(settings.instagram)}" placeholder="اختياري"></div>
      </div>
      <button class="primary-btn" id="saveSettings">حفظ بيانات الصفحة</button>
    </div>

    <div class="panel">
      <div class="panel-head">${editing ? 'تعديل المنتج' : 'إضافة منتج جديد'}</div>
      ${editing ? `<div class="edit-banner"><span>بتعدّلي: ${esc(editing.name)}</span><button class="chip-btn" id="cancelEdit">إلغاء</button></div>`:''}

      <div class="field"><label>اسم المنتج *</label><input id="p-name" value="${esc(editing?.name)}" placeholder="مثال: سيروم فيتامين سي"></div>
      <div class="field"><label>وصف قصير</label><input id="p-desc" value="${esc(editing?.desc)}" placeholder="ليه بتنصحي بيه"></div>

      <div class="field">
        <label>صورة المنتج</label>
        <div class="drop" id="prodDrop">
          <div id="prodInner" class="drop-inner">
            ${(pendingImage.url || editing?.image)
              ? `<div class="preview-row"><img src="${esc(pendingImage.url || editing.image)}"><span>اضغطي لتغيير الصورة</span></div>`
              : 'اضغطي هنا أو اسحبي صورة المنتج من جهازك'}
          </div>
          <div class="bar" id="prodBar" style="display:none"><span></span></div>
        </div>
        <input type="file" id="prodFile" accept="image/*" hidden>
        <div class="hint">الصورة بتترفع من جهازك على طول وبتوصل لكل الناس</div>
      </div>

      <div class="field"><label>رابط نون / أمازون (لينك العمولة) *</label><input id="p-link" value="${esc(editing?.link)}" placeholder="https://..." dir="ltr"></div>

      <div class="grid2">
        <div class="field"><label>كود خصم</label><input id="p-code" value="${esc(editing?.code)}" placeholder="اختياري" dir="ltr"></div>
        <div class="field"><label>التصنيف</label>
          <select id="p-cat">
            ${Object.entries(CATEGORIES).map(([k,v])=>
              `<option value="${k}" ${editing?.category===k?'selected':''}>${v}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="field" style="display:flex;align-items:center;gap:9px;">
        <input type="checkbox" id="p-feat" style="width:auto" ${editing?.featured?'checked':''}>
        <label for="p-feat" style="margin:0;font-weight:500;">توصية اليوم (تظهر أول واحدة ومميزة)</label>
      </div>

      <button class="primary-btn green" id="saveProduct">${editing?'حفظ التعديل':'إضافة المنتج'}</button>
    </div>

    <div class="panel">
      <div class="panel-head">المنتجات <span style="font-weight:500;color:var(--ink-soft);font-size:13px">${products.length}</span></div>
      ${products.length ? products.map(row).join('') : `<div class="empty">لسه مفيش منتجات</div>`}
    </div>
  `;

  bind();
}

function row(p){
  return `
    <div class="prod">
      ${p.image ? `<img src="${esc(p.image)}" alt="">` : `<div class="noimg"></div>`}
      <div class="meta">
        <div class="n">${esc(p.name)} ${p.featured?'⭐':''}</div>
        <div class="l">${esc(p.link)}</div>
      </div>
      <div class="acts">
        <button class="chip-btn ${p.featured?'active':''}" data-feat="${p.id}">${p.featured?'مميّز':'تمييز'}</button>
        <button class="chip-btn" data-edit="${p.id}">تعديل</button>
        <button class="chip-btn danger" data-del="${p.id}">حذف</button>
      </div>
    </div>`;
}

/* ---------- UPLOAD ---------- */
function wireUpload(dropId, fileId, barId, innerId, onDone){
  const drop = $(dropId), input = $(fileId), bar = $(barId), inner = $(innerId);
  drop.onclick = () => input.click();
  drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
  drop.ondragleave = () => drop.classList.remove('over');
  drop.ondrop = e => { e.preventDefault(); drop.classList.remove('over');
    if(e.dataTransfer.files[0]) handle(e.dataTransfer.files[0]); };
  input.onchange = () => { if(input.files[0]) handle(input.files[0]); };

  function handle(file){
    if(!file.type.startsWith('image/')){ toast('لازم تكون صورة', true); return; }
    if(file.size > 5*1024*1024){ toast('الصورة أكبر من 5 ميجا', true); return; }

    const path = `images/${Date.now()}_${file.name.replace(/[^\w.\-]/g,'_')}`;
    const task = uploadBytesResumable(ref(storage, path), file);
    bar.style.display = 'block';
    inner.textContent = 'جاري الرفع…';

    task.on('state_changed',
      s => bar.firstElementChild.style.width = (s.bytesTransferred/s.totalBytes*100)+'%',
      err => { console.error(err); toast('فشل رفع الصورة', true); bar.style.display='none'; inner.textContent='اضغطي هنا لاختيار صورة'; },
      async () => {
        const url = await getDownloadURL(task.snapshot.ref);
        bar.style.display = 'none';
        inner.innerHTML = `<div class="preview-row"><img src="${url}"><span>تم الرفع — اضغطي للتغيير</span></div>`;
        onDone({ url, path });
        toast('اترفعت الصورة');
      }
    );
  }
}

/* ---------- BIND ---------- */
function bind(){
  $('logoutBtn').onclick = () => signOut(auth);
  if($('cancelEdit')) $('cancelEdit').onclick = () => { editingId=null; pendingImage={url:'',path:''}; render(); };

  wireUpload('avatarDrop','avatarFile','avatarBar','avatarInner', r => pendingAvatar = r);
  wireUpload('prodDrop','prodFile','prodBar','prodInner', r => pendingImage = r);

  $('saveSettings').onclick = async () => {
    const btn = $('saveSettings'); btn.disabled = true; btn.textContent = 'جاري الحفظ…';
    settings = {
      title: $('s-title').value.trim(),
      bio: $('s-bio').value.trim(),
      avatar: pendingAvatar.url || settings.avatar || '',
      tiktok: $('s-tiktok').value.trim(),
      instagram: $('s-insta').value.trim()
    };
    try{
      await setDoc(doc(db,'config','settings'), settings);
      pendingAvatar = {url:'',path:''};
      toast('اتحفظت بيانات الصفحة');
    }catch(e){ console.error(e); toast('فشل الحفظ', true); }
    btn.disabled = false; btn.textContent = 'حفظ بيانات الصفحة';
  };

  $('saveProduct').onclick = async () => {
    const name = $('p-name').value.trim();
    const link = $('p-link').value.trim();
    if(!name){ toast('اكتبي اسم المنتج', true); return; }
    if(!link){ toast('حطي رابط المنتج', true); return; }

    const editing = editingId ? products.find(p=>p.id===editingId) : null;
    const data = {
      name, link,
      desc: $('p-desc').value.trim(),
      code: $('p-code').value.trim(),
      category: $('p-cat').value,
      featured: $('p-feat').checked,
      image: pendingImage.url || editing?.image || '',
      imagePath: pendingImage.path || editing?.imagePath || ''
    };

    const btn = $('saveProduct'); btn.disabled = true; btn.textContent = 'جاري الحفظ…';
    try{
      if(editingId){
        await updateDoc(doc(db,'products',editingId), data);
        toast('اتحفظ التعديل');
      }else{
        data.createdAt = serverTimestamp();
        await addDoc(collection(db,'products'), data);
        toast('اتضاف المنتج ✓');
      }
      editingId = null; pendingImage = {url:'',path:''};
      await boot();
    }catch(e){ console.error(e); toast('فشل الحفظ', true); btn.disabled=false; btn.textContent='إضافة المنتج'; }
  };

  document.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => {
    editingId = b.dataset.edit; pendingImage = {url:'',path:''};
    render(); window.scrollTo({top:0, behavior:'smooth'});
  });

  document.querySelectorAll('[data-feat]').forEach(b => b.onclick = async () => {
    const p = products.find(x=>x.id===b.dataset.feat);
    try{
      await updateDoc(doc(db,'products',p.id), { featured: !p.featured });
      p.featured = !p.featured; render();
    }catch(e){ toast('فشل التعديل', true); }
  });

  document.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
    const p = products.find(x=>x.id===b.dataset.del);
    if(!confirm(`متأكدة إنك عايزة تمسحي "${p.name}"؟`)) return;
    try{
      await deleteDoc(doc(db,'products',p.id));
      if(p.imagePath){ try{ await deleteObject(ref(storage,p.imagePath)); }catch(e){} }
      products = products.filter(x=>x.id!==p.id);
      if(editingId===p.id) editingId=null;
      render(); toast('اتمسح المنتج');
    }catch(e){ toast('فشل الحذف', true); }
  });
}
</script>
</body>
</html>
